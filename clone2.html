<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                margin:0;
                background-color: black;
            }
            .leftside
            {
                display: flex;
                background-color:white; 
                justify-content:space-between;
                align-items: center;
                gap: 25px;
            }
            .left{
                display: flex;

                justify-content:space-between;

            }
            .navbar{
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color:grey;
                padding:5px 10px ;
                color:white;
            }
            .button{
                background-color: green;
                border-radius: 20%;
                border-color: white;
                padding:10px 20px;
                cursor: pointer;
                border:0px;
                color: white;
               
                
            }
            .button:hover{

            }
            .logo{
                font-size: larger;
                font-weight: bold;
               color: darkgreen;
            }
            .navbar div{
                padding: 10px 20px;

            }
            .navbar div:hover{

            }
            .menu{
                border:0px ;
                border-radius:20px
            }

                padding:3px;
            }

            }

<body>
<div class="leftside">
<div class="logo">W3<br>School</div>
<select class="menu">
    <option value=selected hidden>menu</option>
    <option>references</option>
    <option>tutorial</option>

    <option>certificates</option></select>
</select>
<div class="search">

<button type="submit">search</button>
</div>
<button class="button">sign in</button></div>
<div class="navbar">
    <div>HTML</div>

</div>

</html>
